<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>

  <!-- AI Brain Icon -->
  <g transform="translate(5, 10)">
    <!-- Main circle -->
    <circle cx="20" cy="20" r="18" fill="url(#logoGradient)" opacity="0.9"/>
    <!-- Inner circuit pattern -->
    <circle cx="20" cy="20" r="12" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <!-- Neural nodes -->
    <circle cx="20" cy="14" r="3" fill="white" opacity="0.9"/>
    <circle cx="14" cy="22" r="3" fill="white" opacity="0.9"/>
    <circle cx="26" cy="22" r="3" fill="white" opacity="0.9"/>
    <!-- Connections -->
    <line x1="20" y1="17" x2="14" y2="19" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="20" y1="17" x2="26" y2="19" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="14" y1="22" x2="26" y2="22" stroke="white" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Text: Claude -->
  <text x="50" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="700" fill="url(#logoGradient)">Claude</text>

  <!-- Text: 天团 -->
  <text x="130" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#333">天团</text>
</svg>
