<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#iconGradient)"/>
  <!-- Inner circuit pattern -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <!-- Neural nodes -->
  <circle cx="16" cy="11" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="11" cy="18" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="21" cy="18" r="2.5" fill="white" opacity="0.9"/>
  <!-- Connections -->
  <line x1="16" y1="13.5" x2="11" y2="15.5" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="13.5" x2="21" y2="15.5" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="11" y1="18" x2="21" y2="18" stroke="white" stroke-width="1.2" opacity="0.5"/>
</svg>
