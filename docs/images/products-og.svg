<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative pattern -->
  <g opacity="0.05">
    <path d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z" fill="white"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="white" opacity="0.05"/>

  <!-- Product box icon -->
  <g transform="translate(80, 180)">
    <rect x="0" y="20" width="120" height="100" rx="10" fill="white" opacity="0.95"/>
    <rect x="10" y="30" width="100" height="30" rx="5" fill="#0ea5e9" opacity="0.3"/>
    <rect x="10" y="70" width="60" height="10" rx="3" fill="#0284c7" opacity="0.4"/>
    <rect x="10" y="90" width="80" height="10" rx="3" fill="#0284c7" opacity="0.3"/>
    <!-- Download arrow -->
    <path d="M95 45 L105 45 L100 55 Z" fill="#0ea5e9"/>
  </g>

  <!-- Main title -->
  <text x="230" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="64" font-weight="bold" fill="white">Digital Products</text>
  <text x="230" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="32" fill="white" opacity="0.9">For Dental Practices</text>

  <!-- Tagline -->
  <text x="230" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="26" fill="white" opacity="0.85">Professional Templates &amp; Systems</text>

  <!-- Accent line -->
  <rect x="230" y="380" width="250" height="4" rx="2" fill="url(#accentGradient)"/>

  <!-- Product badges -->
  <g transform="translate(230, 420)">
    <!-- Product 1 badge -->
    <rect x="0" y="0" width="180" height="50" rx="25" fill="white" opacity="0.2"/>
    <text x="15" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" fill="white">Missed Call Recovery</text>

    <!-- Product 2 badge -->
    <rect x="200" y="0" width="180" height="50" rx="25" fill="white" opacity="0.2"/>
    <text x="215" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" fill="white">Communication Templates</text>
  </g>

  <!-- Pricing -->
  <g transform="translate(230, 500)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="22" fill="white" opacity="0.9">
      <tspan font-weight="bold">$27</tspan>
      <tspan opacity="0.7"> &amp; </tspan>
      <tspan font-weight="bold">$19</tspan>
    </text>
  </g>

  <!-- URL -->
  <text x="230" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" fill="white" opacity="0.7">sunnclaw.github.io/claude-squad/products.html</text>
</svg>
