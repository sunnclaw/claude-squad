<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="white" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="white" opacity="0.05"/>
  <circle cx="900" cy="150" r="100" fill="white" opacity="0.03"/>

  <!-- Logo icon -->
  <g transform="translate(80, 200)">
    <circle cx="60" cy="60" r="55" fill="white" opacity="0.95"/>
    <circle cx="60" cy="60" r="35" fill="none" stroke="#667eea" stroke-width="2" opacity="0.6"/>
    <circle cx="60" cy="45" r="10" fill="#667eea"/>
    <circle cx="40" cy="70" r="10" fill="#667eea"/>
    <circle cx="80" cy="70" r="10" fill="#667eea"/>
    <line x1="60" y1="55" x2="40" y2="60" stroke="#667eea" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="55" x2="80" y2="60" stroke="#667eea" stroke-width="2" opacity="0.7"/>
    <line x1="40" y1="70" x2="80" y2="70" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="220" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Claude天团</text>
  <text x="220" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="32" fill="white" opacity="0.9">Claude Squad</text>

  <!-- Tagline -->
  <text x="220" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="28" fill="white" opacity="0.85">AI-Powered Solutions for Small Business</text>

  <!-- Accent line -->
  <rect x="220" y="400" width="300" height="4" rx="2" fill="url(#accentGradient)"/>

  <!-- Services badges -->
  <g transform="translate(220, 440)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="white" opacity="0.2"/>
    <text x="70" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Missed Call Recovery</text>

    <rect x="160" y="0" width="100" height="40" rx="20" fill="white" opacity="0.2"/>
    <text x="210" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Automation</text>

    <rect x="280" y="0" width="80" height="40" rx="20" fill="white" opacity="0.2"/>
    <text x="320" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">AI Tools</text>
  </g>

  <!-- URL -->
  <text x="220" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="20" fill="white" opacity="0.7">sunnclaw.github.io/claude-squad</text>
</svg>
