<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="1100" cy="150" r="200" fill="white" opacity="0.05"/>
  <circle cx="100" cy="480" r="180" fill="white" opacity="0.05"/>

  <!-- Phone icon with notification -->
  <g transform="translate(80, 170)">
    <!-- Phone body -->
    <rect x="10" y="0" width="100" height="180" rx="15" fill="white" opacity="0.95"/>
    <rect x="20" y="25" width="80" height="130" rx="5" fill="#667eea" opacity="0.15"/>
    <!-- Phone screen content -->
    <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="12" fill="#667eea" text-anchor="middle">(512) 266-xxxx</text>
    <text x="60" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="10" fill="#667eea" opacity="0.7" text-anchor="middle">Incoming Call</text>
    <!-- Answer/Decline buttons -->
    <circle cx="35" cy="130" r="15" fill="#10b981"/>
    <circle cx="85" cy="130" r="15" fill="#ef4444"/>
    <!-- Home button -->
    <circle cx="60" cy="165" r="8" fill="#667eea" opacity="0.3"/>
    <!-- Missed call badge -->
    <circle cx="105" cy="15" r="22" fill="#ef4444"/>
    <text x="105" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">!</text>
  </g>

  <!-- Main title -->
  <text x="240" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="56" font-weight="bold" fill="white">Never Miss Another</text>
  <text x="240" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="56" font-weight="bold" fill="white">Patient Call</text>

  <!-- Subtitle -->
  <text x="240" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="26" fill="white" opacity="0.9">AI-Powered Missed Call Recovery for Dental Clinics</text>

  <!-- Accent line -->
  <rect x="240" y="360" width="280" height="4" rx="2" fill="url(#accentGradient)"/>

  <!-- Stats -->
  <g transform="translate(240, 400)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="48" font-weight="bold" fill="white">3-5</text>
    <text x="100" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="20" fill="white" opacity="0.8">appointments recovered</text>
    <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" fill="white" opacity="0.7">per month on average</text>
  </g>

  <!-- Value prop badges -->
  <g transform="translate(240, 500)">
    <rect x="0" y="0" width="160" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="80" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">24/7 Coverage</text>

    <rect x="175" y="0" width="180" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="265" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">5-Min Response Time</text>

    <rect x="370" y="0" width="150" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="445" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">14-Day Free Trial</text>
  </g>

  <!-- CTA -->
  <rect x="240" y="560" width="200" height="50" rx="25" fill="white"/>
  <text x="340" y="593" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" font-weight="600" fill="#667eea" text-anchor="middle">Start Free Trial</text>

  <!-- Brand -->
  <text x="1050" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-size="18" fill="white" opacity="0.6" text-anchor="end">Claude天团</text>
</svg>
